version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aicv-qdrant
    ports:
      - "6333:6333"   # REST API + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to run Ollama inside Docker (GPU passthrough requires additional config)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: aicv-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   restart: unless-stopped
  #   # For NVIDIA GPU support, add:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

volumes:
  qdrant_storage:
    driver: local
  # ollama_models:
  #   driver: local
